name: Backend CI

on:
  pull_request:
    paths:
      - "backend/**"
      - "infra/localstack/**"
      - ".env.example"
      - "compose.yaml"
      - ".github/workflows/backend-ci.yml"
  push:
    branches: ["main"]
    paths:
      - "backend/**"
      - "infra/localstack/**"
      - ".env.example"
      - "compose.yaml"
      - ".github/workflows/backend-ci.yml"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-24.04
    services:
      postgres:
        image: postgis/postgis:17-3.5-alpine
        env:
          POSTGRES_USER: wheelmatch
          POSTGRES_PASSWORD: ci-only-password
          POSTGRES_DB: wheelmatch_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U wheelmatch -d wheelmatch_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
      redis:
        image: redis:7.4-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    env:
      WHEELMATCH_ENVIRONMENT: test
      WHEELMATCH_DATABASE_URL: postgresql+asyncpg://wheelmatch:ci-only-password@localhost:5432/wheelmatch_test
      WHEELMATCH_REDIS_URL: redis://localhost:6379/0
      WHEELMATCH_TEST_DATABASE_URL: postgresql+asyncpg://wheelmatch:ci-only-password@localhost:5432/wheelmatch_test
      WHEELMATCH_TEST_REDIS_URL: redis://localhost:6379/0
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements-dev.lock
      - run: python -m pip install --require-hashes -r backend/requirements-dev.lock
      - run: ruff format --check backend
      - run: ruff check backend
      - run: mypy --config-file backend/pyproject.toml backend
      - run: pytest backend/tests/unit
        env:
          PYTHONPATH: backend
      - run: alembic -c backend/alembic.ini upgrade head
      - run: pytest backend/tests --cov=app --cov-config=backend/pyproject.toml --cov-report=term-missing
        env:
          PYTHONPATH: backend
      - run: python backend/scripts/export_openapi.py --check
      - run: alembic -c backend/alembic.ini check
      - run: docker compose --env-file .env.example config --quiet
      - run: docker build --file backend/Dockerfile --tag wheelmatch-backend:ci backend
