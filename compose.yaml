name: wheelmatch

x-backend-environment: &backend-environment
  WHEELMATCH_ENVIRONMENT: local
  WHEELMATCH_LOG_LEVEL: INFO
  WHEELMATCH_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:?set POSTGRES_USER}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:?set POSTGRES_DB}
  WHEELMATCH_REDIS_URL: redis://:${REDIS_PASSWORD:?set REDIS_PASSWORD}@redis:6379/0
  WHEELMATCH_AWS_REGION: ${WHEELMATCH_AWS_REGION:-us-east-1}
  WHEELMATCH_AWS_ENDPOINT_URL: http://localstack:4566
  WHEELMATCH_SQS_EVENTS_QUEUE_URL: http://localstack:4566/000000000000/wheelmatch-events
  WHEELMATCH_S3_MEDIA_BUCKET: ${WHEELMATCH_S3_MEDIA_BUCKET:-wheelmatch-media-local}
  AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-localstack}
  AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-localstack}

x-backend: &backend
  image: wheelmatch-backend:local
  restart: unless-stopped
  environment: *backend-environment
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
    localstack:
      condition: service_healthy

services:
  postgres:
    image: postgis/postgis:17-3.5-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?set POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:?set POSTGRES_DB}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD:?set REDIS_PASSWORD}"]
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:?set REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  localstack:
    image: localstack/localstack:4.6
    restart: unless-stopped
    environment:
      SERVICES: s3,sqs
      AWS_DEFAULT_REGION: ${WHEELMATCH_AWS_REGION:-us-east-1}
      S3_BUCKET: ${WHEELMATCH_S3_MEDIA_BUCKET:-wheelmatch-media-local}
    ports:
      - "127.0.0.1:${LOCALSTACK_PORT:-4566}:4566"
    volumes:
      - ./.localstack:/var/lib/localstack
      - ./infra/localstack/init-aws.sh:/etc/localstack/init/ready.d/init-aws.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:4566/_localstack/health | grep -q '\"sqs\": \"running\"'"]
      interval: 5s
      timeout: 3s
      retries: 30

  migrate:
    <<: *backend
    restart: "no"
    healthcheck:
      disable: true
    command: ["alembic", "-c", "alembic.ini", "upgrade", "head"]

  api:
    <<: *backend
    build:
      context: ./backend
    ports:
      - "127.0.0.1:${API_PORT:-8000}:8000"
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      localstack:
        condition: service_healthy

  worker:
    <<: *backend
    command: ["python", "-m", "app.workers.main"]
    healthcheck:
      disable: true
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      localstack:
        condition: service_healthy

  outbox-relay:
    <<: *backend
    command: ["python", "-m", "app.workers.outbox_relay"]
    healthcheck:
      disable: true
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      localstack:
        condition: service_healthy

volumes:
  postgres-data:
  redis-data:
